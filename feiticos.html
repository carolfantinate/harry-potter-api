<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feitiços - Harry Potter</title>

    <style>
        @import url('https://fonts.cdnfonts.com/css/harry-potter');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #1a1a1a;
            padding: 25px 0;
        }

        h1 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-size: 3em;
            color: white;
        }

        h2 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-size: 2em;
            color: white;
            margin-top: 15px;
        }

        .search-box {
            position: relative;
            max-width: 400px;
            margin: 20px auto;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .search-box i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
        }

        #container-spells {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card-spell {
            background: #222;
            color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);

            opacity: 0;
            transform: translateY(10px);
            animation: aparecer 0.4s ease forwards;
        }

        .card-spell h3 {
            margin-bottom: 10px;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #btnTopo {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 99;
            cursor: pointer;
            padding: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
            background-color: #5d5d5d;
            color: #fff;
            border: none;
        }

        .card-spell {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-spell:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .card-spell::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .card-spell:hover::before {
            left: 100%;
        }

        .card-spell:hover::after {
            opacity: 1;
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

    <header>
        <h1>Harry Potter</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
    </nav>

    <main>
        <section>
            <h2>Feitiços</h2>

            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar feitiço...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div id="container-spells"></div>
        </section>
    </main>

    <button id="btnTopo" onclick="voltarTopo()">↑</button>

    <script src="https://kit.fontawesome.com/f9c90ebe75.js"></script>

    <script>
        let listaSpells = []

        async function carregarSpells() {
            const container = document.getElementById('container-spells')
            container.innerHTML = '<p style="color:white">Carregando...</p>'

            try {
                const resposta = await fetch('https://potterapi-fedeperin.vercel.app/pt/spells')
                listaSpells = await resposta.json()

                mostrarSpells(listaSpells)
            } catch (erro) {
                console.error(erro)
            }
        }

        function mostrarSpells(spells) {
            const container = document.getElementById('container-spells')
            container.innerHTML = ''

            if (spells.length === 0) {
                container.innerHTML = '<p style="color:white">Nenhum feitiço encontrado.</p>'
                return
            }

            spells.forEach(spell => {
                const card = document.createElement('div')
                card.classList.add('card-spell')

                card.innerHTML = `
                <h3>${spell.spell}</h3>
                <p>${spell.use || "Sem descrição"}</p>
            `

                container.appendChild(card)
            })
        }

        function aplicarBusca() {
            const termo = document.getElementById('search').value.toLowerCase()

            const filtrados = listaSpells.filter(spell =>
                spell.spell.toLowerCase().includes(termo) ||
                (spell.use && spell.use.toLowerCase().includes(termo))
            )

            mostrarSpells(filtrados)
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarSpells()
            document.getElementById('search').addEventListener('input', aplicarBusca)
        })

        window.onscroll = function () {
            let btn = document.getElementById("btnTopo")
            if (document.body.scrollTop > 30 || document.documentElement.scrollTop > 30) {
                btn.style.display = "block"
            } else {
                btn.style.display = "none"
            }
        }

        function voltarTopo() {
            document.body.scrollTop = 0
            document.documentElement.scrollTop = 0
        }

        function classificarSpell(spell) {
            const desc = (spell.description || "").toLowerCase()

            if (desc.includes("damage") || desc.includes("attack") || desc.includes("harm")) {
                return "ataque"
            }

            if (desc.includes("protect") || desc.includes("shield") || desc.includes("defense")) {
                return "defesa"
            }

            if (desc.includes("control") || desc.includes("stop") || desc.includes("freeze")) {
                return "controle"
            }

            return "utilidade"
        }
    </script>

</body>

</html>
