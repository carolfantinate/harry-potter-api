<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter - API</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/harry-potter');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background-color: #121212;
            font-family: 'Arial', sans-serif;
        }

        header {
            background-color: #1a1a1a;
            padding: 25px 0;
        }

        h1 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 3em;
            color: #fff;
        }

        h2 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 2em;
            color: #fff;
           text-shadow: 2px 2px 4px #464646;
            margin-top: 15px;
        }

        #container-personagens {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card-personagem {
            background: #222;
            color: white;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card-personagem:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .personagem-imagem {
            width: 100%;
            height: 300px;

            object-fit: cover;
            border-radius: 10px;
        }

        h3 {
            font-size: 1.5em;
            text-align: center;
            margin: 5px 0;
        }

        #btnTopo {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 99;
            cursor: pointer;
            padding: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
            background-color: #5d5d5d;
            color: #fff;
            border: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>Harry Potter</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <main>
        <section>
            <h2>Pesonagens de Hogwarts</h2>
            <div id="container-personagens">
            </div>
        </section>
    </main>
    <button id="btnTopo" onclick="voltarTopo()">↑</button>
    <footer>

    </footer>

    <script>
        async function carregarPersonagens() {
            const containerPersonagens = document.getElementById('container-personagens')
            containerPersonagens.innerHTML = '<p>Carregando...</p>'

            try {
                const resposta = await fetch('https://potterhead-api.vercel.app/api/characters')
                const personagens = await resposta.json()

                containerPersonagens.innerHTML = ''

                personagens.forEach(personagem => {
                    const card = document.createElement('div')
                    card.classList.add('card-personagem')

                    card.innerHTML = `
                    <img src="${personagem.image || "https://www.mooreseal.com/wp-content/uploads/2013/11/dummy-image-square.jpg"}" class="personagem-imagem">
                        <h3>${personagem.name}</h3>
                        <p><strong>Casa:</strong> ${personagem.house || "Desconhecida"}</p>
                        <p><strong>Espécie:</strong> ${personagem.species || "Desconhecida"}</p>
                        <p><strong>Gênero:</strong> ${personagem.gender || "Desconhecido"}</p>
                        <p><strong>Patrono:</strong> ${personagem.patronus || "Desconhecido"}</p>
                    `
                    containerPersonagens.appendChild(card)
                })
            }
            catch (error) {
                console.error(error)
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarPersonagens()
        })

        window.onscroll = function () {
            let btn = document.getElementById("btnTopo");
            if (document.body.scrollTop > 30 || document.documentElement.scrollTop > 30) {
                btn.style.display = "block"; // Mostra
            } else {
                btn.style.display = "none"; // Esconde
            }
        };

        function voltarTopo() {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        }

    </script>
</body>

</html>
