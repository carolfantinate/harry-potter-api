<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter - API</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/harry-potter');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background-color: #121212;
            font-family: 'Arial', sans-serif;
        }

        header {
            background-color: #1a1a1a;
            padding: 25px 0;
        }

        h1 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 3em;
            color: #fff;
        }

        h2 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 2em;
            color: #fff;
            text-shadow: 2px 2px 4px #464646;
            margin-top: 15px;
        }

        #container-personagens {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .card-personagem {
            background: #222;
            color: white;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card-personagem:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .personagem-imagem {
            width: 100%;
            height: 300px;

            object-fit: cover;
            border-radius: 10px;
        }

        h3 {
            font-size: 1.5em;
            text-align: center;
            margin: 5px 0;
        }

        #btnTopo {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 99;
            cursor: pointer;
            padding: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
            background-color: #5d5d5d;
            color: #fff;
            border: none;
        }

        .search-box {
            position: relative;
            max-width: 400px;
            margin: 20px auto;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .search-box #icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
        }

        .filtros {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filtros button {
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            background-color: #121212;
            border: none;
        }

        /* Casas */
        #btn-grifinoria {
            border: 2px solid #7F0909;
        }

        #btn-sonserina {
            border: 2px solid #0D6217;
        }

        #btn-corvinal {
            border: 2px solid #000A90;
        }

        #btn-lufalufa {
            border: 2px solid #eed817;
        }

        #btn-todos {
            border: 2px solid #fff;
        }

        .filtros button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Ativo (selecionado) */
        .filtros button.ativo {
            transform: scale(1.1);
            background-color: #313131;
        }

        .card-personagem {
            opacity: 0;
            transform: translateY(10px);
            animation: aparecer 0.4s ease forwards;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Harry Potter</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="casas.html">Casas</a>
    </nav>
    <main>
        <section>
            <h2>Pesonagens de Hogwarts</h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar personagem...">
                <i class="fa-solid fa-magnifying-glass" id="icon"></i>
            </div>

            <div class="filtros">
                <button id="btn-todos" class="ativo" onclick="filtrarCasa('')">Todos</button>
                <button id="btn-grifinoria" onclick="filtrarCasa('Gryffindor')">Grifinória</button>
                <button id="btn-sonserina" onclick="filtrarCasa('Slytherin')">Sonserina</button>
                <button id="btn-corvinal" onclick="filtrarCasa('Ravenclaw')">Corvinal</button>
                <button id="btn-lufalufa" onclick="filtrarCasa('Hufflepuff')">Lufa-Lufa</button>
            </div>

            <div id="container-personagens">
            </div>
        </section>
    </main>
    <button id="btnTopo" onclick="voltarTopo()">↑</button>
    <footer>

    </footer>

    <script src="https://kit.fontawesome.com/f9c90ebe75.js" crossorigin="anonymous"></script>
    <script>let listaPersonagens = []
        let casaSelecionada = ''

        function pegarCasaDaURL() {
            const params = new URLSearchParams(window.location.search)
            return params.get('casa')
        }

        async function carregarPersonagens() {
            const containerPersonagens = document.getElementById('container-personagens')
            containerPersonagens.innerHTML = '<p>Carregando...</p>'

            try {
                const resposta = await fetch('https://potterhead-api.vercel.app/api/characters')
                listaPersonagens = await resposta.json()

                aplicarFiltros()
            } catch (error) {
                console.error(error)
            }
        }

        function mostrarPersonagens(personagens) {
            const containerPersonagens = document.getElementById('container-personagens')
            containerPersonagens.innerHTML = ''

            if (personagens.length === 0) {
                containerPersonagens.innerHTML = '<p>Nenhum personagem encontrado.</p>'
                return
            }

            personagens.forEach(personagem => {
                const card = document.createElement('div')
                card.classList.add('card-personagem')

                card.innerHTML = `
            <img src="${personagem.image || "https://www.mooreseal.com/wp-content/uploads/2013/11/dummy-image-square.jpg"}" class="personagem-imagem">
            <h3>${personagem.name}</h3>
            <p><strong>Casa:</strong> ${personagem.house || "Desconhecida"}</p>
            <p><strong>Espécie:</strong> ${personagem.species || "Desconhecida"}</p>
            <p><strong>Gênero:</strong> ${personagem.gender || "Desconhecido"}</p>
            <p><strong>Patrono:</strong> ${personagem.patronus || "Desconhecido"}</p>
        `

                containerPersonagens.appendChild(card)
            })
        }

        function aplicarFiltros() {
            const termo = document.getElementById('search').value.toLowerCase()

            let resultado = listaPersonagens

            if (termo !== '') {
                resultado = resultado.filter(p =>
                    p.name.toLowerCase().includes(termo)
                )
            }

            if (casaSelecionada !== '') {
                resultado = resultado.filter(p =>
                    p.house === casaSelecionada
                )
            }

            mostrarPersonagens(resultado)
        }

        function filtrarCasa(casa) {
            casaSelecionada = casa

            document.querySelectorAll('.filtros button').forEach(btn => {
                btn.classList.remove('ativo')
            })

            const botoes = document.querySelectorAll('.filtros button')
            botoes.forEach(btn => {
                if (btn.getAttribute('onclick') === `filtrarCasa('${casa}')`) {
                    btn.classList.add('ativo')
                }
            })

            aplicarFiltros()
        }

        document.addEventListener('DOMContentLoaded', () => {
            const casaURL = pegarCasaDaURL()

            if (casaURL) {
                casaSelecionada = casaURL

                // 🔥 ativa o botão correto
                const botoes = document.querySelectorAll('.filtros button')

                botoes.forEach(btn => {
                    if (btn.getAttribute('onclick') === `filtrarCasa('${casaURL}')`) {
                        btn.classList.add('ativo')
                    } else {
                        btn.classList.remove('ativo')
                    }
                })
            }

            carregarPersonagens()

            document.getElementById('search').addEventListener('input', aplicarFiltros)
        })

        window.onscroll = function () {
            let btn = document.getElementById("btnTopo")
            if (document.body.scrollTop > 30 || document.documentElement.scrollTop > 30) {
                btn.style.display = "block"
            } else {
                btn.style.display = "none"
            }
        }

        function voltarTopo() {
            document.body.scrollTop = 0
            document.documentElement.scrollTop = 0
        }
    </script>
</body>

</html>
