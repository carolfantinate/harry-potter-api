<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter - API</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/harry-potter');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            font-family: 'Arial', sans-serif;
        }

        header {
            background-color: #1a1a1a;
            padding: 25px 0;
        }

        h1 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 3em;
            color: #fff;
        }

        h2 {
            font-family: 'Harry Potter', sans-serif;
            text-align: center;
            font-weight: normal;
            font-size: 2em;
            color: #fff;
            text-shadow: 2px 2px 4px #464646;
            margin-top: 15px;
        }

        #container-casas {
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: auto;
            width: 80%;
        }

        .card-casa {
            background: #222;
            color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0px 8px 7px rgba(0, 0, 0, 0.3);
        }

        .casa-logo {
            width: 150px;
            border-radius: 10px;
        }

        .sonserina {
            border: 1px solid #005100;
        }

        .corvinal {
            border: 1px solid #000080;
        }

        .lufa-lufa {
            border: 1px solid #e6cf00;
        }

        .grifinória {
            border: 1px solid #800000;
        }
    </style>
</head>

<body>
    <header>
        <h1>Harry Potter</h1>
        <!-- <img src="https://www.harrypotter.com/_next/static/images/logo-gold-600-7a7e89b6db1ffeaab025f2091d21b645.png" alt="Harry Potter Logo" id="hp-logo"> -->
    </header>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <main>
        <section>
            <h2>Casas de Hogwarts</h2>
            <div id="container-casas">
            </div>
        </section>
        <h2>Descubra sua casa!</h2>
        <a href="quiz.html">Fazer quiz</a>
    </main>
    <footer>

    </footer>

    <script>
        const casas = [
            {
                nome: "Grifinória",
                valor: "Gryffindor",
                descricao: "Coragem, bravura e determinação",
                imagem: "./assets/imgs/gryffindor.png"
            },
            {
                nome: "Sonserina",
                valor: "Slytherin",
                descricao: "Ambição, astúcia e liderança",
                imagem: "./assets/imgs/slytherin.png"
            },
            {
                nome: "Corvinal",
                valor: "Ravenclaw",
                descricao: "Inteligência e criatividade",
                imagem: "./assets/imgs/ravenclaw.png"
            },
            {
                nome: "Lufa-Lufa",
                valor: "Hufflepuff",
                descricao: "Lealdade e trabalho duro",
                imagem: "./assets/imgs/hufflepuff.png"
            }
        ]

        const containerCasas = document.getElementById('container-casas')

        casas.forEach(casa => {
            const card = document.createElement('div')
            card.classList.add('card-casa')

            card.innerHTML = `
        <img src="${casa.imagem}" class="casa-logo">
        <h3>${casa.nome}</h3>
        <p>${casa.descricao}</p>
        <a href="personagens.html?casa=${casa.valor}">Ver personagens</a>
    `

            containerCasas.appendChild(card)
        })
    </script>
</body>

</html>
